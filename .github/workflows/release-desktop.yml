name: release-desktop

on:
  push:
    tags:
      - 'v*'
      - 'desktop-v*'
  workflow_dispatch:

# Cancel an in-flight release if a newer run is started for the same tag/ref
# (e.g. a re-tag after spotting a last-minute issue). Different tags get
# different groups so v1.0.1 and v1.0.2 can build in parallel.
concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Tauri (${{ matrix.os }})
    # All runner images pinned to the current LTS-equivalent rather than
    # `*-latest`, so an upstream image promotion can't surprise a release.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            args: '--bundles appimage,deb'
          - os: macos-14
            args: '--target universal-apple-darwin --bundles app,dmg'
          - os: windows-2022
            args: '--bundles msi,nsis'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS needs both Apple Silicon and Intel targets for the universal
          # binary; the others only need the host triple.
          targets: ${{ matrix.os == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock', 'packages/desktop/src-tauri/Cargo.toml') }}

      - name: Install Tauri Linux build deps
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional code-signing secrets, hooked up when you're ready:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Daedalus ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          # `projectPath` is a workspace package; pnpm-lock.yaml lives at the
          # repo root, so the action's lockfile auto-detect doesn't see it
          # and falls back to npm. Force pnpm explicitly so the existing
          # `pnpm install --frozen-lockfile` step is what we build against.
          tauriScript: pnpm tauri
