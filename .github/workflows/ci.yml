name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + typecheck + test + web build
    # Pinned to the current Ubuntu LTS so a runner image bump can't silently
    # break the build. Bump deliberately when a new LTS lands.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web bundle
        run: pnpm --filter @daedalus/web build

      - name: Upload web dist
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: packages/web/dist
          retention-days: 7
