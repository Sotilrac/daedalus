default:
  # Pinned to the current Node LTS on Debian Bookworm. Bump when the next
  # Node LTS lands rather than relying on `latest` tags.
  image: node:22.21.1-bookworm
  interruptible: true

# Cancel an in-flight pipeline when a newer commit lands on the same ref —
# every job is `interruptible`, so all of them get pulled. Project-level
# "Auto-cancel redundant pipelines" can stay default; this is the explicit
# YAML opt-in (GitLab 15.8+).
workflow:
  auto_cancel:
    on_new_commit: interruptible

# GitLab runs the cheap correctness checks on every push. Tag-driven release
# builds (Linux AppImage/deb, macOS dmg, Windows msi/nsis) live in GitHub
# Actions; see `.github/workflows/release-desktop.yml`.

variables:
  PNPM_HOME: '$CI_PROJECT_DIR/.pnpm-store'
  npm_config_cache: '$CI_PROJECT_DIR/.npm'

stages: [install, check]

.pnpm-cache: &pnpm-cache
  key:
    files: [pnpm-lock.yaml]
  paths: [.pnpm-store/, node_modules/, packages/*/node_modules/]

.setup: &setup
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.33.1 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

install:
  stage: install
  cache:
    <<: *pnpm-cache
    policy: pull-push
  <<: *setup
  script: [pnpm -v, node -v]

lint:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script: [pnpm lint]

typecheck:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script: [pnpm typecheck]

test:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script: [pnpm test]
